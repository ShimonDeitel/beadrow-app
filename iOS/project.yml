name: BeadRow
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
targets:
  BeadRow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeadRow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beadinventory
        INFOPLIST_FILE: BeadRow/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Bead Row - Bead Inventory"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: BeadRow/Info.plist
      properties:
        CFBundleDisplayName: "Bead Row - Bead Inventory"
        ITSAppUsesNonExemptEncryption: false
  BeadRowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeadRowTests
    dependencies:
      - target: BeadRow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beadinventory.tests
  BeadRowUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeadRowUITests
    dependencies:
      - target: BeadRow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beadinventory.uitests
schemes:
  BeadRow:
    build:
      targets:
        BeadRow: all
    test:
      targets:
        - BeadRowTests
        - BeadRowUITests
    run:
      config: Debug
